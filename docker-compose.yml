services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      API_KEY: local-dev-key
      DATABASE_URL: postgresql+psycopg://invoicebridge:invoicebridge@db:5432/invoicebridge
      AUTO_CREATE_TABLES: "true"
      LOG_LEVEL: INFO
      DEPLOYMENT_REGION: local-dev
      REGION_ROLE: local
      DATA_RESIDENCY_REGION: local
      ACTIVE_REGIONS: local-dev
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoicebridge
      POSTGRES_PASSWORD: invoicebridge
      POSTGRES_DB: invoicebridge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicebridge -d invoicebridge"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
