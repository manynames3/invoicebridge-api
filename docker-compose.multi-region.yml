services:
  api-eu-west:
    build: .
    ports:
      - "8001:8000"
    environment:
      APP_ENV: local-multiregion
      API_KEY: local-dev-key
      DATABASE_URL: postgresql+psycopg://invoicebridge:invoicebridge@db-eu-west:5432/invoicebridge
      AUTO_CREATE_TABLES: "true"
      LOG_LEVEL: INFO
      DEPLOYMENT_REGION: eu-west-1
      REGION_ROLE: primary
      DATA_RESIDENCY_REGION: EU
      ACTIVE_REGIONS: eu-west-1,eu-central-1
      FAILOVER_REGION: eu-central-1
    depends_on:
      db-eu-west:
        condition: service_healthy

  api-eu-central:
    build: .
    ports:
      - "8002:8000"
    environment:
      APP_ENV: local-multiregion
      API_KEY: local-dev-key
      DATABASE_URL: postgresql+psycopg://invoicebridge:invoicebridge@db-eu-central:5432/invoicebridge
      AUTO_CREATE_TABLES: "true"
      LOG_LEVEL: INFO
      DEPLOYMENT_REGION: eu-central-1
      REGION_ROLE: standby
      DATA_RESIDENCY_REGION: EU
      ACTIVE_REGIONS: eu-west-1,eu-central-1
      FAILOVER_REGION: eu-west-1
    depends_on:
      db-eu-central:
        condition: service_healthy

  db-eu-west:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoicebridge
      POSTGRES_PASSWORD: invoicebridge
      POSTGRES_DB: invoicebridge
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicebridge -d invoicebridge"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_eu_west_data:/var/lib/postgresql/data

  db-eu-central:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: invoicebridge
      POSTGRES_PASSWORD: invoicebridge
      POSTGRES_DB: invoicebridge
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoicebridge -d invoicebridge"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_eu_central_data:/var/lib/postgresql/data

volumes:
  postgres_eu_west_data:
  postgres_eu_central_data:
